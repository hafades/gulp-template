<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Template</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4; width: 100%;">
  <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f4f4f4;">
    <tr>
      <td align="center" style="padding: 20px 0;">
        <table border="0" cellpadding="0" cellspacing="0" width="600" style="background-color: #ffffff; border-radius: 8px; max-width: 600px; width: 100%;">
          <tr>
            <td style="padding: 20px;">
              <h1 style="margin: 0 0 20px; color: #333333; font-family: Arial, sans-serif; font-size: 24px;">Заголовок</h1>
              <p style="margin: 0 0 15px; color: #666666; font-family: Arial, sans-serif; font-size: 16px; line-height: 1.5;">Текст письма</p>
              <table border="0" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="border-radius: 4px;" bgcolor="#007bff">
                    <a href="#" style="display: inline-block; padding: 12px 24px; color: #ffffff; text-decoration: none; font-family: Arial, sans-serif; font-size: 16px;">Кнопка</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
        <table border="0" cellpadding="0" cellspacing="0" width="600" style="max-width: 600px; width: 100%;">
          <tr>
            <td style="padding: 20px; text-align: center;">
              <p style="margin: 0; color: #999999; font-family: Arial, sans-serif; font-size: 12px;">© 2026 Компания. Все права защищены.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
